<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>WA Web Sidebar Toggle</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <img
        src="../icons/icon48.png"
        alt=""
        class="header-icon"
        width="28"
        height="28"
      />
      <div class="header-text">
        <span class="header-name" id="ext-name">WA Sidebar Toggle</span>
        <span class="header-version" id="ext-version"></span>
      </div>
    </header>

    <main class="content">
      <!-- Miniature, looping mock of the actual collapse/expand the
           extension performs - the signature visual, not decoration. -->
      <div class="mock-window" aria-hidden="true">
        <div class="mock-rail"><span></span><span></span><span></span></div>
        <div class="mock-panel"></div>
        <div class="mock-main">
          <span class="mock-bubble mock-bubble--in"></span>
          <span class="mock-bubble mock-bubble--out short"></span>
          <span class="mock-bubble mock-bubble--in"></span>
        </div>
      </div>

      <p class="tagline">Hide the chat list. Focus on one conversation.</p>
      <p class="tip">Tip: press <kbd>Alt</kbd> + <kbd>S</kbd> anytime</p>

      <div class="actions">
        <a
          id="link-github"
          class="btn btn--ghost"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor">
            <path
              d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.27 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z"
            />
          </svg>
          Star on GitHub
        </a>
        <a
          id="link-review"
          class="btn btn--ghost"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg
            viewBox="0 0 24 24"
            width="15"
            height="15"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />
          </svg>
          Leave a review
        </a>
      </div>

      <hr class="divider" />

      <div class="dev-row">
        <span class="dev-label">Made by: <strong id="dev-name">—</strong></span>
        <div class="socials">
          <a
            id="link-social-github"
            class="icon-link"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="GitHub profile"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path
                d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.237 1.838 1.237 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"
              />
            </svg>
          </a>
          <a
            id="link-social-linkedin"
            class="icon-link"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="GitHub profile"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path
                fill-rule="evenodd"
                d="M5 1a4 4 0 0 0 -4 4v14a4 4 0 0 0 4 4h14a4 4 0 0 0 4 -4V5a4 4 0 0 0 -4 -4H5Zm1.205 6.91a1.705 1.705 0 1 0 0 -3.41 1.705 1.705 0 0 0 0 3.41ZM7.909 19.5V9.273H4.5V19.5h3.41Zm4.432 -10.227H9.273V19.5h3.068v-6.17c0.395 -0.642 1.077 -1.33 2.045 -1.33 1.364 0 1.705 1.364 1.705 2.046V19.5H19.5v-5.454c0 -1.828 -0.797 -4.773 -3.75 -4.773 -1.878 0 -2.92 0.685 -3.41 1.327V9.273Z"
                clip-rule="evenodd"
                stroke-width="1"
              ></path>
            </svg>
          </a>
          <a
            id="link-social-freelancer"
            class="icon-link"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="X profile"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
              <path
                d="m14.096 3.076 1.634 2.292L24 3.076M5.503 20.924l4.474 -4.374 -2.692 -2.89m6.133 -10.584L11.027 5.23l4.022 0.15M4.124 3.077l0.857 1.76 4.734 0.294m-3.058 7.072 3.497 -6.522L0 5.13m7.064 7.485 3.303 3.548 3.643 -3.57 1.13 -6.652 -4.439 -0.228Z"
              ></path>
            </svg>
          </a>
          <a
            id="link-social-site"
            class="icon-link"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Website"
          >
            <svg
              viewBox="0 0 24 24"
              width="16"
              height="16"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="2" y1="12" x2="22" y2="12" />
              <path
                d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
              />
            </svg>
          </a>
        </div>
      </div>

      <div class="cta-row">
        <a
          id="link-hire"
          class="btn btn--hire"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg
            viewBox="0 0 24 24"
            width="15"
            height="15"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="7" width="20" height="14" rx="2" />
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
            <line x1="12" y1="12" x2="12" y2="16" />
            <line x1="10" y1="14" x2="14" y2="14" />
          </svg>
          Hire me
        </a>
        <a
          id="link-support"
          class="btn btn--support"
          target="_blank"
          rel="noopener noreferrer"
        >
          <svg
            viewBox="0 0 24 24"
            width="15"
            height="15"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 8h1a4 4 0 0 1 0 8h-1" />
            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" />
            <line x1="6" y1="1" x2="6" y2="4" />
            <line x1="10" y1="1" x2="10" y2="4" />
            <line x1="14" y1="1" x2="14" y2="4" />
          </svg>
          Buy me a Coffee
        </a>
      </div>
    </main>

    <footer class="footer">Not affiliated with WhatsApp or Meta.</footer>

    <script src="popup.js"></script>
  </body>
</html>
