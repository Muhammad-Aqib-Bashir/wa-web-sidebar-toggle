name: CI

# Runs on every push/PR so a broken manifest, syntax error, or
# platform-specific build issue gets caught long before it's anywhere near
# a release tag. Never publishes anything.
#
# The build itself runs on Ubuntu, Windows, and macOS: scripts/build.js is
# pure Node.js (no bash/zip CLI dependency), so this matrix is what proves
# it actually works the same way on every OS a contributor might use.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json is valid JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8'))"
          echo "manifest.json OK"

      - name: Validate content.js syntax
        run: node --check src/content.js

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build extension zip
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-build-${{ matrix.os }}
          path: dist/*.zip
